<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Skranji:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="flex-centered">
      <div class="form-image flex-centered">
        <div class="logo flex-centered">
          <img src="logo.svg" alt="Site logo" />
          <h1 class="skranji-bold">Final Fury</h1>
        </div>
        <span
          >Photo by
          <a
            href="https://unsplash.com/photos/a-close-up-of-a-red-flower-on-a-black-background-VAJbHGApnLk"
            >Mariyan Rajesh</a
          >
          on <a href="https://unsplash.com/">Unsplash</a></span
        >
      </div>
      <div class="form-content flex-centered">
        <div class="intro flex-centered">
          <h2>
            Ready to fight? Sign up for our ultimate kickboxing tournament
            today! Showcase your skills, face top rivals, and win the
            championship belt. Secure your spot in the ring now!
          </h2>
          <h2>Choose Your Destiny!</h2>
        </div>
        <div class="flex-centered">
          <h2>Unleash the fury! 🥷</h2>
          <form action="" class="flex-centered">
            <div>
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" />
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" />
            </div>
            <div>
              <label for="email">Email</label>
              <input type="email" id="email" />
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" />
            </div>
            <div>
              <label for="password">Password</label>
              <input type="password" id="password" />
              <label for="confirm">Confirm Password</label>
              <input type="password" id="confirm" />
            </div>
          </form>
        </div>
        <div class="submit flex-centered">
          <button>Create Account</button>
          <p>Already have an account?<span> Log in</span></p>
          
        </div>
      </div>
    </section>
  </body>
</html>
