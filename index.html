<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Skranji:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="flex-centered">
      <div class="form-image flex-centered">
        <div class="logo flex-centered">
          <img src="logo.svg" alt="Site logo" />
          <h1 class="skranji-bold">Final Fury</h1>
        </div>
        <span
          >Photo by
          <a
            href="https://unsplash.com/photos/a-close-up-of-a-red-flower-on-a-black-background-VAJbHGApnLk"
            >Mariyan Rajesh</a
          >
          on <a href="https://unsplash.com/">Unsplash</a></span
        >
      </div>
      <div class="form-content flex-centered">
        <div class="intro flex-centered">
          <h2>
            Ready to fight? Sign up for our ultimate kickboxing tournament
            today! Showcase your skills, face top rivals, and win the
            championship belt. Secure your spot in the ring now!
          </h2>
          <h2>Choose Your Destiny!</h2>
        </div>
        <div class="flex-centered">
          <h2>Unleash the fury! 🥷</h2>
          <form action="" class="flex-centered">
            <div class="flex-centered">
              <div class="flex-centered form-grp">
                <label for="first-name">First Name *</label>
                <input type="text" name="first-name" id="first-name" required />
              </div>
              <div class="flex-centered form-grp">
                <label for="last-name">Last Name</label>
                <input type="text" name="last-name" id="last-name" />
              </div>
            </div>
            <div class="flex-centered">
              <div class="flex-centered form-grp">
                <label for="email">Email *</label>
                <input type="email" name="email" id="email" required />
              </div>
              <div class="flex-centered form-grp">
                <label for="phone">Phone Number *</label>
                <input type="tel" name="phone" id="phone" required />
              </div>
            </div>
            <div class="flex-centered">
              <div class="flex-centered form-grp">
                <label for="password">Password</label>
                <input
                  type="password"
                  name="password"
                  id="password"
                  pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}$"
                  minlength="3"
                  maxlength="16"
                />
              </div>
              <div class="flex-centered form-grp">
                <label for="confirm">Confirm Password</label>
                <input
                  type="password"
                  name="confirm"
                  id="confirm"
                  pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}$"
                  minlength="3"
                  maxlength="16"
                />
              </div>
            </div>
          </form>
        </div>
        <div class="submit flex-centered">
          <button>Create Account</button>
          <p>Already have an account?<span> Log in</span></p>
        </div>
      </div>
    </section>
  </body>
</html>
